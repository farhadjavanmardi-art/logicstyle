<title>Logic Style — Präsentation für Salons</title>
<style>
  :root{
    --ground:#FAF6EF;--panel:#FFFFFF;--ink:#211C17;--ink-soft:#5B5148;--hair:#E4DBCC;
    --brass:#B07B3E;--brass-deep:#8F5F26;--espresso:#2A231D;--gold-wash:#F3E9D8;
    --shadow:24px 32px 60px -32px rgba(42,35,29,.35);--maxw:680px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --ground:#1A1512;--panel:#241E19;--ink:#F4ECDF;--ink-soft:#B4A692;--hair:#3A322A;
      --brass:#D19A57;--brass-deep:#E0AE6C;--espresso:#F4ECDF;--gold-wash:#2E271F;
      --shadow:24px 32px 70px -34px rgba(0,0,0,.7);
    }
  }
  :root[data-theme="dark"]{
    --ground:#1A1512;--panel:#241E19;--ink:#F4ECDF;--ink-soft:#B4A692;--hair:#3A322A;
    --brass:#D19A57;--brass-deep:#E0AE6C;--espresso:#F4ECDF;--gold-wash:#2E271F;
    --shadow:24px 32px 70px -34px rgba(0,0,0,.7);
  }
  :root[data-theme="light"]{
    --ground:#FAF6EF;--panel:#FFFFFF;--ink:#211C17;--ink-soft:#5B5148;--hair:#E4DBCC;
    --brass:#B07B3E;--brass-deep:#8F5F26;--espresso:#2A231D;--gold-wash:#F3E9D8;
    --shadow:24px 32px 60px -32px rgba(42,35,29,.35);
  }

  *{box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    margin:0;background:var(--ground);color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    line-height:1.7;font-size:17px;-webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 22px}

  /* RTL: use a clean system face that has Arabic/Persian glyphs for headings */
  body[dir="rtl"] .brand,body[dir="rtl"] h1,body[dir="rtl"] h2,body[dir="rtl"] .big{
    font-family:"Segoe UI","Tahoma",system-ui,sans-serif;
  }

  /* ---------- Language bar ---------- */
  .langbar{
    position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--ground) 88%,transparent);
    -webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
    border-bottom:1px solid var(--hair);
  }
  .langbar-in{
    max-width:var(--maxw);margin:0 auto;padding:10px 14px;
    display:flex;flex-wrap:wrap;gap:7px;justify-content:center;
  }
  .langbtn{
    font:inherit;font-size:13.5px;font-weight:600;cursor:pointer;
    padding:6px 13px;border-radius:999px;border:1px solid var(--hair);
    background:transparent;color:var(--ink-soft);transition:all .12s ease;
  }
  .langbtn:hover{border-color:var(--brass);color:var(--brass-deep)}
  .langbtn.on{background:var(--brass-deep);border-color:var(--brass-deep);color:#fff}
  .langbtn:focus-visible{outline:2px solid var(--brass);outline-offset:2px}

  /* ---------- Hero ---------- */
  .hero{padding:52px 0 46px;text-align:center;
    background:radial-gradient(120% 90% at 50% -10%, var(--gold-wash) 0%, transparent 60%);}
  .brand{font-family:Georgia,serif;font-weight:700;letter-spacing:.02em;font-size:15px;
    text-transform:uppercase;color:var(--brass);display:inline-flex;align-items:center;gap:10px;}
  .brand::before,.brand::after{content:"";width:26px;height:1px;background:var(--brass);opacity:.6}
  .eyebrow{margin:26px 0 0;font-size:12.5px;letter-spacing:.2em;text-transform:uppercase;
    color:var(--ink-soft);font-weight:600;}
  h1{font-family:Georgia,"Times New Roman",serif;font-weight:700;
    font-size:clamp(30px,7vw,44px);line-height:1.12;margin:14px 0 0;
    text-wrap:balance;letter-spacing:-.01em;}
  .lead{font-size:18px;color:var(--ink-soft);margin:20px auto 0;max-width:42ch;text-wrap:balance}

  /* ---------- Sections ---------- */
  section{padding:40px 0;border-top:1px solid var(--hair)}
  section:first-of-type{border-top:none}
  .kicker{font-size:12px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--brass);font-weight:700;margin:0 0 10px;}
  h2{font-family:Georgia,serif;font-weight:700;font-size:clamp(22px,4.5vw,28px);
     margin:0 0 12px;line-height:1.24;text-wrap:balance}
  p{margin:0 0 16px}p:last-child{margin-bottom:0}
  strong{color:var(--ink);font-weight:700}

  .steps{list-style:none;margin:8px 0 0;padding:0;display:grid;gap:16px}
  .steps li{display:grid;grid-template-columns:34px 1fr;gap:16px;align-items:start;}
  .num{font-family:Georgia,serif;font-weight:700;color:var(--brass);font-size:20px;
    line-height:1.3;border-bottom:2px solid var(--hair);text-align:center;}
  .steps li p{margin:0}
  .steps b{display:block;color:var(--ink);font-weight:700;margin-bottom:2px}

  .offer{background:var(--panel);border:1px solid var(--hair);border-radius:18px;
    padding:30px 26px;box-shadow:var(--shadow);text-align:center;}
  .big{font-family:Georgia,serif;font-weight:700;color:var(--brass-deep);
    font-size:clamp(46px,13vw,72px);line-height:.95;letter-spacing:-.02em;}
  .big span{font-size:.34em;display:block;letter-spacing:.1em;text-transform:uppercase;
    color:var(--ink-soft);font-family:system-ui,sans-serif;font-weight:700;margin-top:8px}
  .offer .note{color:var(--ink-soft);font-size:15px;margin:16px auto 0;max-width:38ch}
  .badges{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:20px}
  .badge{font-size:13px;font-weight:600;color:var(--ink);background:var(--gold-wash);
    border:1px solid var(--hair);border-radius:999px;padding:7px 14px;}

  .privacy{background:var(--gold-wash);border-radius:14px;padding:22px 24px;border:1px solid var(--hair);}
  .privacy h2{font-size:20px;display:flex;align-items:center;gap:10px}
  .privacy p{color:var(--ink-soft);font-size:15px}
  .privacy a{color:var(--brass-deep);font-weight:600;text-decoration:none}
  .privacy a:hover{text-decoration:underline}

  .cta{text-align:center}
  .btns{display:flex;flex-direction:column;gap:12px;margin-top:22px}
  .btn{display:block;text-decoration:none;font-weight:700;font-size:16px;
    padding:15px 20px;border-radius:12px;transition:transform .12s ease,box-shadow .12s ease;}
  .btn.primary{background:var(--brass-deep);color:#fff}
  .btn.primary:hover{transform:translateY(-2px);box-shadow:0 12px 24px -12px var(--brass-deep)}
  .btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--hair)}
  .btn.ghost:hover{border-color:var(--brass);color:var(--brass-deep)}
  .btn:focus-visible{outline:2px solid var(--brass);outline-offset:3px}

  .contact{margin-top:26px;display:grid;gap:2px;font-size:15px;text-align:center;color:var(--ink-soft);}
  .contact a{color:var(--brass-deep);text-decoration:none;font-weight:600}
  .contact a:hover{text-decoration:underline}

  footer{text-align:center;padding:34px 0 46px;color:var(--ink-soft);font-size:13px;border-top:1px solid var(--hair);}
  footer a{color:var(--ink-soft)}

  @media (min-width:560px){.btns{flex-direction:row;justify-content:center}.btn{flex:1;max-width:260px}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>

const RTL = ["fa","ar"];
function setLang(l){
  const d = I18N[l]; if(!d) return;
  document.querySelectorAll("[data-i18n]").forEach(function(el){
    const k = el.getAttribute("data-i18n");
    if(d[k] != null) el.textContent = d[k];
  });
  const rtl = RTL.indexOf(l) !== -1;
  document.documentElement.setAttribute("lang", l);
  document.body.setAttribute("dir", rtl ? "rtl" : "ltr");
  document.querySelectorAll(".langbtn").forEach(function(b){
    b.classList.toggle("on", b.getAttribute("data-l") === l);
  });
  try{ localStorage.setItem("ls_lang", l); }catch(e){}
}
(function(){
  var saved = "de";
  try{ saved = localStorage.getItem("ls_lang") || "de"; }catch(e){}
  if(!I18N[saved]) saved = "de";
  setLang(saved);
})();
