<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>

  const SUPABASE_URL      = "https://owgfhhkmlkdpjqlwavsx.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_xGeaZikMQI8MclH3CnClBg_INoBJ7F-";
  const TELEGRAM_TOKEN    = "8276944606:AAH784KsaizFRKSEyimuK_bcZGh5qdpkp8o";
  const TELEGRAM_CHAT_ID  = "822853301";
  const ADMIN_EMAIL       = "farhadjavanmardi@icloud.com";

  const SVC_DE={haircut:"Haarschnitt",beard_s:"Bart kurz",beard_l:"Bart lang & Styling",color:"Haarfarbe",highlight:"Highlights"};
  const SVC_FA={haircut:"اصلاح مو",beard_s:"ریش کوتاه",beard_l:"ریش بلند",color:"رنگ مو",highlight:"هایلایت"};

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080A;--surface:#101014;--surface-2:#18181E;--line:#242428;--pink:#FF1F6E;--text:#F5F0F3;--muted:#7A7484;--radius:14px}
*{box-sizing:border-box;margin:0;padding:0}
html{overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:"Sora",system-ui,sans-serif;line-height:1.6;overflow-x:hidden;max-width:100vw}
img{max-width:100%}
.wrap{max-width:1080px;margin:0 auto;padding:22px}
.pip{width:8px;height:8px;border-radius:50%;background:var(--pink);box-shadow:0 0 10px var(--pink);display:inline-block}
.brand{display:flex;align-items:center;gap:9px;font-weight:900;font-size:1.05rem}
header{border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(8,8,10,.9);backdrop-filter:blur(14px);z-index:10}
.topbar{display:flex;align-items:center;gap:12px;height:62px}
.btn{background:var(--pink);color:#fff;border:0;cursor:pointer;padding:9px 18px;border-radius:999px;font:inherit;font-weight:700;font-size:.88rem;box-shadow:0 6px 20px -8px var(--pink)}
.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--text);box-shadow:none}
.btn.ghost:hover{border-color:var(--pink);color:var(--pink)}
.btn.sm{padding:6px 13px;font-size:.82rem}
.btn.wa{background:#25D366;color:#fff;box-shadow:none}
.btn.wa:hover{background:#1ebe5b}
.btn.tg{background:#229ED9;color:#fff;box-shadow:none}
.btn.tg:hover{background:#1a87bb}
.msg-preview{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-top:12px;font-size:.82rem;line-height:1.7;white-space:pre-wrap;color:var(--muted)}
input,select,textarea{background:var(--bg);border:1px solid var(--line);border-radius:9px;color:var(--text);padding:10px 12px;font:inherit;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--pink)}

/* login */
.login{max-width:360px;margin:12vh auto;background:var(--surface);border:1px solid var(--line);border-radius:20px;padding:30px}
.login h1{font-size:1.3rem;margin-bottom:4px}
.login p{color:var(--muted);font-size:.88rem;margin-bottom:18px}
.login .field{margin-bottom:12px}
.login label{font-size:.82rem;font-weight:600;display:block;margin-bottom:6px}
.err{color:#f0a0a0;font-size:.85rem;margin-top:8px}

/* dashboard */
.tabs{display:flex;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;gap:8px;margin:20px 0 16px;scrollbar-width:none;padding-bottom:2px}
.tabs::-webkit-scrollbar{display:none}
.tab{background:var(--surface);border:1px solid var(--line);color:var(--muted);border-radius:999px;padding:8px 18px;cursor:pointer;font:inherit;font-weight:600;font-size:.88rem;white-space:nowrap;flex:0 0 auto}
.tab.on{background:var(--pink);color:#fff;border-color:var(--pink)}
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px 16px}
.kpi b{display:block;font-size:1.5rem}
.kpi span{color:var(--muted);font-size:.78rem}
.kpi.grn b{color:#74e0a0}
.kpi.red b{color:#f0a0a0}
.tools{display:flex;flex-wrap:wrap;gap:9px;align-items:center;margin-bottom:16px}
.tools .grow{flex:1;min-width:150px}
.chip{background:var(--surface);border:1px solid var(--line);border-radius:999px;padding:7px 13px;cursor:pointer;font-size:.82rem;color:var(--muted)}
.chip.on{border-color:var(--pink);color:var(--pink)}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px 18px;margin-bottom:12px}
.card .top{display:flex;flex-wrap:wrap;gap:9px;justify-content:space-between;align-items:flex-start}
.card .name{font-weight:700;font-size:1rem}
.card .meta{color:var(--muted);font-size:.82rem;margin-top:3px}
.badge{padding:4px 11px;border-radius:999px;font-size:.75rem;font-weight:700;white-space:nowrap}
.badge.confirmed{background:rgba(40,170,90,.16);color:#74e0a0}
.badge.pending{background:rgba(255,180,84,.14);color:#FFB454}
.badge.cancelled{background:rgba(220,60,60,.14);color:#f0a0a0}
.detail{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px 18px;margin-top:12px;padding-top:12px;border-top:1px solid var(--line)}
.detail div span{color:var(--muted);font-size:.72rem;display:block}
.detail div b{font-weight:600;font-size:.9rem}
.actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.note-box{margin-top:10px}
.note-box textarea{min-height:60px}
.empty{text-align:center;color:var(--muted);padding:44px 0}

/* accounting */
.acc-h{font-size:.95rem;color:#FFB454;font-weight:700;margin:16px 0 10px}
.exp-form{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}
.exp-form label{font-size:.78rem;color:var(--muted);display:block;margin-bottom:5px}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
.cat-card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
.cat-card b{display:block;font-size:1.05rem}
.cat-card span{color:var(--muted);font-size:.78rem}
.exp-row{display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--surface);border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-bottom:8px;font-size:.88rem}
.exp-row .l span{color:var(--muted);font-size:.76rem;margin-inline-start:8px}
.exp-del{background:none;border:0;color:#f0a0a0;cursor:pointer;font-size:1rem}
.photo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px}
.photo-card{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--line);aspect-ratio:1}
.photo-card img{width:100%;height:100%;object-fit:cover;display:block}
.photo-card .del{position:absolute;top:4px;inset-inline-end:4px;background:rgba(0,0,0,.6);border:0;color:#f0a0a0;width:24px;height:24px;border-radius:50%;cursor:pointer;font-size:.85rem;line-height:1}
.queue-row{display:flex;gap:12px;align-items:flex-start;padding:10px;border-bottom:1px solid var(--line)}
.queue-row img{width:60px;height:60px;object-fit:cover;border-radius:8px;flex-shrink:0}
.qmeta{font-size:.85rem}
.qcap{color:var(--muted);font-size:.78rem;margin-top:2px}
.qerr{color:#f0a0a0;font-size:.75rem;margin-top:2px}
[hidden]{display:none!important}
input[type=file]{width:100%;max-width:100%}
@media(max-width:480px){
  .wrap{padding:14px}
  .tab{padding:7px 13px;font-size:.8rem}
  .kpi b{font-size:1.2rem}
  .brand{font-size:.92rem}
  .card .name{font-size:.92rem}
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginView">
<div class="login">
  <div class="brand" style="margin-bottom:16px"><span class="pip"></span> Logic Style · Salon Admin</div>
  <h1>Anmelden</h1>
  <p>Für die Verwaltung einloggen.</p>
  <div class="field"><label>E-Mail</label><input type="email" id="em" autocomplete="username"></div>
  <div class="field"><label>Passwort</label><input type="password" id="pw" autocomplete="current-password"></div>
  <button class="btn" style="width:100%" id="loginBtn">Einloggen</button>
  <div class="err" id="loginErr"></div>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashView" hidden>
<header><div class="wrap topbar">
  <div class="brand"><span class="pip"></span> Logic Style · Salon</div>
  <button class="btn ghost sm" id="logoutBtn" style="margin-inline-start:auto">Ausloggen</button>
</div></header>

<div class="wrap">
  <div class="tabs">
    <button class="tab on" id="tRes" onclick="setTab('res')">Termine</button>
    <button class="tab" id="tAcc" onclick="setTab('acc')">Buchhaltung</button>
    <button class="tab" id="tInsta" onclick="setTab('insta')">📸 اینستاگرام</button>
    <button class="tab" id="tTg" onclick="setTab('tg')">✈️ تلگرام</button>
  </div>

  <!-- TERMINE -->
  <div id="pRes">
    <div class="kpis" id="kpis"></div>
    <div class="tools">
      <input class="grow" id="search" placeholder="Suche: Name, Leistung…">
      <span class="chip on" onclick="setF('all',this)">Alle</span>
      <span class="chip" onclick="setF('confirmed',this)">Bestätigt</span>
      <span class="chip" onclick="setF('pending',this)">Ausstehend</span>
      <span class="chip" onclick="setF('cancelled',this)">Abgesagt</span>
      <button class="btn ghost sm" onclick="load()">Aktualisieren</button>
    </div>
    <div id="apptList"></div>
  </div>

  <!-- BUCHHALTUNG -->
  <div id="pAcc" hidden>
    <div class="kpis" id="accKpis"></div>
    <div class="acc-h">Neue Ausgabe erfassen</div>
    <div class="exp-form">
      <div><label>Datum</label><input type="date" id="exp_d"></div>
      <div><label>Kategorie</label>
        <select id="exp_c">
          <option value="products">Produkte</option>
          <option value="equipment">Equipment</option>
          <option value="rent">Miete / Strom</option>
          <option value="marketing">Marketing</option>
          <option value="other">Sonstiges</option>
        </select>
      </div>
      <div><label>Betrag (€)</label><input type="number" id="exp_a" min="0" step="0.01"></div>
      <div><label>Beschreibung</label><input type="text" id="exp_n"></div>
    </div>
    <button class="btn sm" onclick="addExp()">Ausgabe hinzufügen</button>
    <div class="err" id="expErr" style="margin-top:8px"></div>

    <div class="acc-h" style="margin-top:20px">Ausgaben nach Kategorie</div>
    <div class="cat-grid" id="catGrid"></div>
    <div class="acc-h">Alle Ausgaben</div>
    <div id="expList"></div>
  </div>

  <!-- INSTAGRAM -->
  <div id="pInsta" hidden>
    <div class="acc-h">📸 محتوای جدید برای اینستاگرام</div>
    <input type="file" id="igFile" accept="image/*" multiple style="margin-bottom:6px" onchange="igFilesChanged()">
    <div class="err" id="igCountHint" style="margin-bottom:8px;color:var(--muted);font-size:.78rem"></div>
    <div style="margin:10px 0;display:flex;flex-wrap:wrap;gap:6px 14px">
      <label><input type="radio" name="igKind" value="post" checked onchange="igFilesChanged()"> پست فید (۱ عکس)</label>
      <label><input type="radio" name="igKind" value="carousel" onchange="igFilesChanged()"> کاروسل / چند اسلاید (۲ تا ۱۰ عکس)</label>
      <label><input type="radio" name="igKind" value="story" onchange="igFilesChanged()"> استوری (۱ عکس)</label>
    </div>
    <textarea id="igCaption" placeholder="کپشن (فقط برای پست/کاروسل، نه استوری)" style="width:100%;min-height:120px;margin-bottom:8px"></textarea>
    <button class="btn sm" onclick="queueContent('instagram')">افزودن به صف انتشار</button>
    <div class="err" id="igErr" style="margin-top:8px"></div>
    <div class="acc-h" style="margin-top:24px">تاریخچه صف</div>
    <div id="igQueueList"></div>
  </div>


  <!-- TELEGRAM -->
  <div id="pTg" hidden>
    <div class="acc-h">✈️ محتوای جدید برای تلگرام</div>
    <input type="file" id="tgFile" accept="image/*" multiple style="margin-bottom:6px" onchange="tgFilesChanged()">
    <div class="err" id="tgCountHint" style="margin-bottom:8px;color:var(--muted);font-size:.78rem"></div>
    <textarea id="tgCaption" placeholder="کپشن پیام" style="width:100%;min-height:120px;margin-bottom:8px"></textarea>
    <button class="btn sm" onclick="queueContent('telegram')">افزودن به صف انتشار</button>
    <div class="err" id="tgErr" style="margin-top:8px"></div>
    <div class="acc-h" style="margin-top:24px">تاریخچه صف</div>
    <div id="tgQueueList"></div>
  </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const cfg=SUPABASE_URL&&!SUPABASE_URL.startsWith("YOUR_");
const sb=cfg?window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY):null;
let all=[],expenses=[],filter="all",tab="res";

/* auth */
async function checkSession(){
  if(!sb){showDash();return;}
  const{data}=await sb.auth.getSession();
  if(data.session)showDash();else showLogin();
}
function showLogin(){document.getElementById("loginView").hidden=false;document.getElementById("dashView").hidden=true;}
function showDash(){document.getElementById("loginView").hidden=true;document.getElementById("dashView").hidden=false;load();}

document.getElementById("loginBtn").addEventListener("click",async()=>{
  const e=document.getElementById("loginErr");e.textContent="";
  const email=document.getElementById("em").value.trim(),pw=document.getElementById("pw").value;
  if(!sb){showDash();return;}
  const{error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error){e.textContent="Falsche E-Mail oder Passwort.";return;}
  showDash();
});
document.getElementById("pw").addEventListener("keydown",ev=>{if(ev.key==="Enter")document.getElementById("loginBtn").click();});
document.getElementById("logoutBtn").addEventListener("click",async()=>{if(sb)await sb.auth.signOut();showLogin();});

/* data */
async function load(){
  if(!sb){all=[];render();return;}
  const{data,error}=await sb.from("salon_appointments").select("*").order("booking_date",{ascending:false}).order("booking_slot",{ascending:true});
  if(!error)all=data||[];
  render();loadExp();
}
document.getElementById("search").addEventListener("input",render);
function setF(f,el){filter=f;document.querySelectorAll(".chip").forEach(c=>c.classList.remove("on"));el.classList.add("on");render();}

function setTab(t){
  tab=t;
  document.getElementById("tRes").classList.toggle("on",t==="res");
  document.getElementById("tAcc").classList.toggle("on",t==="acc");
  document.getElementById("tInsta").classList.toggle("on",t==="insta");
  document.getElementById("tTg").classList.toggle("on",t==="tg");
  document.getElementById("pRes").hidden=t!=="res";
  document.getElementById("pAcc").hidden=t!=="acc";
  document.getElementById("pInsta").hidden=t!=="insta";
  document.getElementById("pTg").hidden=t!=="tg";
  if(t==="acc")loadExp();
  if(t==="insta")loadQueue('instagram','igQueueList');
  if(t==="tg")loadQueue('telegram','tgQueueList');
}

/* status */
async function setStatus(id,status){
  if(!sb)return;
  const{error}=await sb.from("salon_appointments").update({status}).eq("id",id);
  if(!error){const r=all.find(x=>x.id===id);if(r)r.status=status;render();}
}
async function deleteAppt(id){
  if(!confirm("Diesen Termin wirklich vollständig löschen?")) return;
  if(!sb)return;
  const{error}=await sb.from("salon_appointments").delete().eq("id",id);
  if(!error){all=all.filter(x=>x.id!==id);render();}
}
async function saveNote(id){
  if(!sb)return;
  const val=document.getElementById("note_"+id).value;
  const btn=document.getElementById("noteBtn_"+id);
  const{error}=await sb.from("salon_appointments").update({admin_notes:val}).eq("id",id);
  if(!error){btn.textContent="Gespeichert ✓";setTimeout(()=>btn.textContent="Notiz speichern",1500);}
}

/* WhatsApp / Telegram */
function normPhone(p){
  let s=String(p||"").replace(/[^\d+]/g,"");
  if(s.startsWith("+"))s=s.slice(1);else if(s.startsWith("00"))s=s.slice(2);else if(s.startsWith("0"))s="49"+s.slice(1);
  return s;
}
function buildMsg(r){
  const svc=r.service?.split(",").map(s=>({haircut:"Haarschnitt ✂️",beard_s:"Bart kurz 🪒",beard_l:"Bart lang & Styling 🧔",color:"Haarfarbe 🎨",highlight:"Highlights ✨"}[s]||s)).join(" + ")||"—";
  const d=new Date(r.booking_date+"T00:00:00").toLocaleDateString("de-DE");
  return `Hallo ${r.first_name}! 👋\n\nDein Termin bei Logic Style Salon ist bestätigt ✅\n\n✂️ Leistung: ${svc}\n📅 Datum: ${d}\n🕗 Uhrzeit: ${r.booking_slot}\n\n📍 Adresse:\nWelfenstraße 30, 3. Etage\n76137 Karlsruhe\n👤 Javanmardi\n📞 01794286020\n\nBis dann! 😊`;
}
function waSend(id){
  const r=all.find(x=>x.id===id);if(!r)return;
  window.open("https://wa.me/"+normPhone(r.phone)+"?text="+encodeURIComponent(buildMsg(r)),"_blank");
}
function tgSend(id){
  const r=all.find(x=>x.id===id);if(!r)return;
  const handle=(r.telegram||"").replace(/^@/,"");
  if(!handle){alert("Kein Telegram-Handle für diesen Kunden.");return;}
  window.open("https://t.me/"+handle,"_blank");
}
async function copyMsg(id){
  const r=all.find(x=>x.id===id);if(!r)return;
  const btn=document.getElementById("copy_"+id);
  try{await navigator.clipboard.writeText(buildMsg(r));}
  catch(e){const ta=document.createElement("textarea");ta.value=buildMsg(r);document.body.appendChild(ta);ta.select();document.execCommand("copy");ta.remove();}
  if(btn){const o=btn.textContent;btn.textContent="Kopiert! ✓";setTimeout(()=>btn.textContent=o,1800);}
}

/* render appointments */
function render(){
  const q=document.getElementById("search").value.trim().toLowerCase();
  let rows=all.filter(r=>filter==="all"||r.status===filter);
  if(q)rows=rows.filter(r=>((r.first_name||"")+" "+(r.last_name||"")+" "+(r.service||"")).toLowerCase().includes(q));
  const tot=all.length,conf=all.filter(r=>r.status==="confirmed").length,pend=all.filter(r=>r.status==="pending").length,canc=all.filter(r=>r.status==="cancelled").length;
  document.getElementById("kpis").innerHTML=
    `<div class="kpi"><b>${tot}</b><span>Gesamt</span></div>`+
    `<div class="kpi grn"><b>${conf}</b><span>Bestätigt</span></div>`+
    `<div class="kpi"><b>${pend}</b><span>Ausstehend</span></div>`+
    `<div class="kpi red"><b>${canc}</b><span>Abgesagt</span></div>`;
  const el=document.getElementById("apptList");
  if(!rows.length){el.innerHTML=`<div class="empty">Keine Termine gefunden.</div>`;return;}
  el.innerHTML=rows.map(r=>`
    <div class="card">
      <div class="top">
        <div><div class="name">${esc(r.first_name)} ${esc(r.last_name)}</div>
          <div class="meta">📅 ${r.booking_date} · ${r.booking_slot||"—"} · ✂️ ${SVC_DE[r.service]||r.service||"—"}</div>
          <div class="meta">📞 ${esc(r.phone||"")}${r.telegram?` · ✈️ ${esc(r.telegram)}`:""}${r.email?` · ✉️ ${esc(r.email)}`:""}
          </div>
        </div>
        <span class="badge ${r.status}">${r.status==="confirmed"?"Bestätigt":r.status==="pending"?"Ausstehend":"Abgesagt"}</span>
      </div>
      ${r.notes?`<div style="margin-top:10px;color:var(--muted);font-size:.85rem">📝 ${esc(r.notes)}</div>`:""}
      <div class="msg-preview">${esc(buildMsg(r))}</div>
      <div class="actions">
        <button class="btn wa sm" onclick="waSend('${r.id}')">📱 WhatsApp senden</button>
        ${r.telegram?`<button class="btn tg sm" onclick="tgSend('${r.id}')">✈️ Telegram öffnen</button>`:""}
        <button class="btn ghost sm" id="copy_${r.id}" onclick="copyMsg('${r.id}')">📋 Text kopieren</button>
        ${r.status!=="confirmed"?`<button class="btn sm" onclick="setStatus('${r.id}','confirmed')">Bestätigen</button>`:""}
        ${r.status!=="cancelled"?`<button class="btn ghost sm" onclick="setStatus('${r.id}','cancelled')">Absagen</button>`:""}
        ${r.status==="cancelled"?`<button class="btn ghost sm" style="color:#f0a0a0;border-color:#f0a0a0" onclick="deleteAppt('${r.id}')">🗑️ Löschen</button>`:""}
      </div>
      <div class="note-box">
        <textarea id="note_${r.id}" placeholder="Notiz für diesen Kunden…">${esc(r.admin_notes||"")}</textarea>
        <button class="btn ghost sm" id="noteBtn_${r.id}" style="margin-top:7px" onclick="saveNote('${r.id}')">Notiz speichern</button>
      </div>
    </div>`).join("");
}
function esc(s){return s==null?"":String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

/* accounting */
const CAT={products:"Produkte",equipment:"Equipment",rent:"Miete / Strom",marketing:"Marketing",other:"Sonstiges"};
async function loadExp(){
  if(!sb){expenses=[];renderAcc();return;}
  const{data,error}=await sb.from("salon_expenses").select("*").order("date",{ascending:false});
  if(!error)expenses=data||[];
  renderAcc();
}
async function addExp(){
  const err=document.getElementById("expErr");err.textContent="";
  const date=document.getElementById("exp_d").value,cat=document.getElementById("exp_c").value;
  const amount=parseFloat(document.getElementById("exp_a").value||"0"),desc=document.getElementById("exp_n").value.trim()||null;
  if(!date||!amount||amount<=0){err.textContent="Bitte Datum und Betrag eingeben.";return;}
  if(!sb)return;
  const{error}=await sb.from("salon_expenses").insert({date,category:cat,amount_eur:amount,description:desc});
  if(error){err.textContent="Fehler beim Speichern.";return;}
  document.getElementById("exp_a").value="";document.getElementById("exp_n").value="";
  loadExp();
}
async function delExp(id){
  if(!sb)return;
  const{error}=await sb.from("salon_expenses").delete().eq("id",id);
  if(!error){expenses=expenses.filter(e=>e.id!==id);renderAcc();}
}
function renderAcc(){
  const totalRev=all.filter(r=>r.status==="confirmed").length;
  const totalExp=expenses.reduce((s,e)=>s+(e.amount_eur||0),0);
  document.getElementById("accKpis").innerHTML=
    `<div class="kpi grn"><b>${all.filter(r=>r.status==="confirmed").length} Termine</b><span>Bestätigte Termine</span></div>`+
    `<div class="kpi red"><b>${totalExp.toFixed(2)} €</b><span>Ausgaben gesamt</span></div>`+
    `<div class="kpi"><b>${all.filter(r=>r.status==="cancelled").length}</b><span>Abgesagt</span></div>`;
  const byCat={};expenses.forEach(e=>{byCat[e.category]=(byCat[e.category]||0)+(e.amount_eur||0);});
  document.getElementById("catGrid").innerHTML=Object.keys(CAT).map(c=>`<div class="cat-card"><b>${(byCat[c]||0).toFixed(2)} €</b><span>${CAT[c]}</span></div>`).join("");
  const el=document.getElementById("expList");
  if(!expenses.length){el.innerHTML=`<div class="empty">Keine Ausgaben erfasst.</div>`;return;}
  el.innerHTML=expenses.map(e=>`
    <div class="exp-row">
      <div class="l"><b>${CAT[e.category]||e.category}</b><span>${e.date}${e.description?" · "+esc(e.description):""}</span></div>
      <div style="display:flex;align-items:center;gap:12px"><b>${(e.amount_eur||0).toFixed(2)} €</b><button class="exp-del" onclick="delExp('${e.id}')">🗑️</button></div>
    </div>`).join("");
}

📸 Instagram: https://www.instagram.com/logic_style_salon/
✈️ Telegram: @Logicstyle_news`;

function igFilesChanged(){
  const kind=document.querySelector('input[name="igKind"]:checked').value;
  const n=(document.getElementById('igFile').files||[]).length;
  const hint=document.getElementById('igCountHint');
  if(kind==='carousel'){
    hint.textContent=n?`${n} عکس انتخاب شده (باید بین ۲ تا ۱۰ تا باشه).`:'برای کاروسل، ۲ تا ۱۰ عکس انتخاب کن.';
  } else {
    hint.textContent=n>1?'برای این نوع فقط عکس اول استفاده می‌شه.':'';
  }
}
function tgFilesChanged(){
  const n=(document.getElementById('tgFile').files||[]).length;
  const hint=document.getElementById('tgCountHint');
  hint.textContent=n>1?`${n} عکس انتخاب شده — به‌صورت آلبوم (حداکثر ۱۰ تا) فرستاده می‌شه.`:'';
}

async function queueContent(platform){
  if(!sb)return;
  const errId=platform==='instagram'?'igErr':'tgErr';
  const err=document.getElementById(errId);err.textContent='';
  const fileInput=document.getElementById(platform==='instagram'?'igFile':'tgFile');
  const files=Array.from(fileInput.files||[]);
  if(!files.length){err.textContent='لطفاً اول یه عکس انتخاب/بگیر.';return;}
  const kind=platform==='instagram'?(document.querySelector('input[name="igKind"]:checked').value):'post';
  const caption=(platform==='instagram'?document.getElementById('igCaption'):document.getElementById('tgCaption')).value.trim()||null;

  if(kind==='carousel'&&(files.length<2||files.length>10)){err.textContent='برای کاروسل باید بین ۲ تا ۱۰ عکس انتخاب کنی.';return;}
  if(platform==='telegram'&&files.length>10){err.textContent='حداکثر ۱۰ عکس برای یه آلبوم تلگرام.';return;}

  const isMulti=kind==='carousel'||(platform==='telegram'&&files.length>1);
  const toUpload=isMulti?files:[files[0]];

  const urls=[];
  for(const file of toUpload){
    const path=`${platform}_${Date.now()}_${Math.random().toString(36).slice(2,7)}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
    const{error:upErr}=await sb.storage.from('content-uploads').upload(path,file,{cacheControl:'3600',upsert:false});
    if(upErr){err.textContent='خطا در آپلود عکس: '+upErr.message;return;}
    urls.push(`${SUPABASE_URL}/storage/v1/object/public/content-uploads/${path}`);
  }

  const row=isMulti
    ?{platform,kind,image_url:urls[0],image_urls:urls,caption,status:'pending'}
    :{platform,kind,image_url:urls[0],image_urls:null,caption,status:'pending'};

  const{error:insErr}=await sb.from('content_queue').insert(row);
  if(insErr){err.textContent='خطا در ثبت صف: '+insErr.message;return;}

  fileInput.value='';
  if(platform==='instagram'){document.getElementById('igCaption').value=DEFAULT_CAPTION;document.getElementById('igCountHint').textContent='';loadQueue('instagram','igQueueList');}
  else{document.getElementById('tgCaption').value=DEFAULT_CAPTION;document.getElementById('tgCountHint').textContent='';loadQueue('telegram','tgQueueList');}
}
async function loadQueue(platform,elId){
  if(!sb)return;
  const{data,error}=await sb.from('content_queue').select('*').eq('platform',platform).order('created_at',{ascending:false}).limit(30);
  const el=document.getElementById(elId);
  if(error){el.innerHTML=`<div class="empty">خطا در بارگذاری صف.</div>`;return;}
  if(!data||!data.length){el.innerHTML=`<div class="empty">هنوز چیزی توی صف نیست.</div>`;return;}
  const statusLabel={pending:'⏳ در انتظار',posted:'✅ منتشر شد',failed:'❌ خطا'};
  const kindLabel={story:'استوری',carousel:'کاروسل',post:'پست'};
  el.innerHTML=data.map(r=>`
    <div class="queue-row">
      <img src="${r.image_url}" loading="lazy">
      <div class="qmeta">
        <div>${kindLabel[r.kind]||r.kind}${r.image_urls&&r.image_urls.length>1?` (${r.image_urls.length} عکس${r.platform==='telegram'?' — آلبوم':''})`:''} — ${statusLabel[r.status]||r.status}</div>
        <div class="qcap">${r.caption?esc(r.caption):''}</div>
        ${r.status==='failed'&&r.error?`<div class="qerr">${esc(r.error)}</div>`:''}
      </div>
    </div>`).join('');
}
