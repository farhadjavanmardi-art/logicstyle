<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Logic Style Salon — پنل مدیریت</title>
<style>
  *{box-sizing:border-box;}
  body{background:#0d0d12;color:#f2f2f5;font-family:Tahoma,sans-serif;margin:0;padding:24px;}
  h1{color:#FF1F6E;margin-bottom:4px;}
  .stats{display:flex;gap:14px;margin:20px 0;flex-wrap:wrap;}
  .stat{background:#1c1c26;border:1px solid #2a2a35;border-radius:12px;padding:16px 20px;min-width:130px;}
  .stat .n{font-size:24px;font-weight:800;color:#FF1F6E;}
  .stat .l{font-size:12px;color:#9a9aa8;}
  table{width:100%;border-collapse:collapse;margin-top:20px;background:#1c1c26;border-radius:12px;overflow:hidden;}
  th,td{padding:10px 12px;text-align:right;font-size:13px;border-bottom:1px solid #2a2a35;}
  th{background:#16161d;color:#9a9aa8;}
  select{background:#16161d;color:#f2f2f5;border:1px solid #2a2a35;border-radius:6px;padding:4px 8px;font-size:12px;}
  .yes{color:#4caf50;font-weight:700;}
  .no{color:#f44336;font-weight:700;}
  .notes-cell{max-width:160px;font-size:11px;color:#9a9aa8;}
</style>
</head>
<body>
<h1>Logic Style Salon</h1>
<p style="color:#9a9aa8">پنل مدیریت نوبت‌ها — Welfenstraße 30, 76137 Karlsruhe</p>
<div class="stats" id="stats"></div>
<table>
  <thead><tr><th>تاریخ</th><th>ساعت</th><th>مشتری</th><th>تلفن</th><th>تلگرام</th><th>خدمت</th><th>رضایت عکس</th><th>یادداشت</th><th>وضعیت</th></tr></thead>
  <tbody id="rows"></tbody>
</table>
<script>
const U="https://owgfhhkmlkdpjqlwavsx.supabase.co", K="sb_publishable_xGeaZikMQI8MclH3CnClBg_INoBJ7F-";
const H={apikey:K,Authorization:`Bearer ${K}`,'Content-Type':'application/json'};
async function load(){
  const res=await fetch(`${U}/rest/v1/salon_appointments?select=*&order=booking_date.desc,booking_slot.desc`,{headers:H});
  const rows=await res.json();
  const pending=rows.filter(r=>r.status==='pending').length;
  const confirmed=rows.filter(r=>r.status==='confirmed').length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="n">${rows.length}</div><div class="l">کل نوبت‌ها</div></div>
    <div class="stat"><div class="n">${pending}</div><div class="l">در انتظار</div></div>
    <div class="stat"><div class="n">${confirmed}</div><div class="l">تأییدشده</div></div>`;
  document.getElementById('rows').innerHTML=rows.map(r=>`
    <tr><td>${r.booking_date||'-'}</td><td>${r.booking_slot||'-'}</td>
    <td>${(r.first_name||'')+' '+(r.last_name||'')}</td><td>${r.phone||'-'}</td><td>${r.telegram||'-'}</td>
    <td>${r.service||'-'}</td>
    <td>${r.photo_consent?'<span class="yes">بله</span>':'<span class="no">خیر</span>'}</td>
    <td class="notes-cell">${r.notes||''}</td>
    <td><select onchange="upd('${r.id}',this.value)">
      <option value="pending" ${r.status==='pending'?'selected':''}>در انتظار</option>
      <option value="confirmed" ${r.status==='confirmed'?'selected':''}>تأییدشده</option>
      <option value="cancelled" ${r.status==='cancelled'?'selected':''}>لغو</option>
    </select></td></tr>`).join('');
}
async function upd(id,status){
  await fetch(`${U}/rest/v1/salon_appointments?id=eq.${id}`,{method:'PATCH',headers:H,body:JSON.stringify({status})});
  load();
}
load();
</script>
</body>
</html>
