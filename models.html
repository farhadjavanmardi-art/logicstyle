<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Logic Style · Galerie</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#000000;--card:#0c0f16;--card2:#0f1219;
  --text:#e8edf5;--muted:#64748b;
  --pink:#e879a0;--pink2:#f0a0bc;
  --pink-dim:rgba(232,121,160,0.08);--pink-border:rgba(232,121,160,0.2);
  --border:rgba(255,255,255,0.06);
  --ok:#4ade80;--ok-bg:rgba(74,222,128,0.08);--ok-border:rgba(74,222,128,0.2);
  --blue:#60a5fa;--danger:#f87171;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{min-height:100svh;overflow-x:hidden}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}

/* ── LOGIN ── */
#loginScreen{position:fixed;inset:0;z-index:9000;background:#000000;background-image:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(232,121,160,0.14) 0%,transparent 60%);display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{width:100%;max-width:380px;background:var(--card);border:1px solid var(--pink-border);border-radius:22px;padding:32px 28px;box-shadow:0 0 60px rgba(232,121,160,0.08)}
.login-logo{text-align:center;margin-bottom:20px}
.login-logo img{height:72px;width:auto;object-fit:contain}
.login-title{font-family:'Rajdhani',sans-serif;font-size:1.2rem;font-weight:700;color:var(--pink);text-align:center;margin-bottom:18px;letter-spacing:1px}
.login-err{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--danger);margin-bottom:12px;display:none}
.f-lbl{display:block;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.f-inp{width:100%;padding:11px 14px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:12px;color:#fff;font-size:14px;outline:none;transition:.2s;font-family:'DM Sans',sans-serif;margin-bottom:10px}
.f-inp:focus{border-color:var(--pink);background:rgba(255,255,255,0.07)}
.btn-login{width:100%;padding:13px;background:var(--pink);color:#000;border:none;border-radius:13px;font-weight:700;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:4px;transition:.2s}
.btn-login:hover{background:var(--pink2)}

/* ── NAV ── */
nav{position:sticky;top:0;z-index:200;background:#000000;border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:14px}
nav img{height:56px;width:auto;object-fit:contain;flex-shrink:0}
.nav-title{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--pink);flex:1}
.btn-sm{padding:7px 14px;border-radius:10px;font-weight:700;font-size:12px;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:.2s;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.btn-sm.light{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--muted)}
.btn-sm.light:hover{border-color:rgba(232,121,160,0.25);color:var(--pink)}
.btn-sm.danger{background:rgba(248,113,113,0.08);border:1px solid rgba(248,113,113,0.2);color:var(--danger)}
.btn-sm.danger:hover{background:rgba(248,113,113,0.16)}
.btn-sm.primary{background:var(--pink);color:#000}
.btn-sm.primary:hover{background:var(--pink2)}

/* ── MODE TABS ── */
.mode-tabs-wrap{position:sticky;top:72px;z-index:150;background:#000000;border-bottom:1px solid var(--border)}
.mode-tabs{display:flex;overflow-x:auto;scrollbar-width:none;padding:0 14px;justify-content:center}
.mode-tabs::-webkit-scrollbar{display:none}
.mode-tab{flex-shrink:0;display:flex;align-items:center;gap:5px;padding:12px 14px;border:none;background:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-weight:700;font-size:13px;cursor:pointer;position:relative;transition:.2s;white-space:nowrap}
.mode-tab::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:transparent;border-radius:2px 2px 0 0;transition:.2s}
.mode-tab.active{color:var(--pink)}
.mode-tab.active::after{background:var(--pink)}
.mode-tab-count{font-family:'Space Mono',monospace;font-size:8px;background:rgba(232,121,160,0.9);color:#000;font-weight:700;padding:2px 7px;border-radius:9px;min-width:18px;text-align:center;display:inline-flex;align-items:center;justify-content:center;transform:none;line-height:1.2}

/* ── SUBCAT TABS ── */
.subcat-wrap{position:sticky;top:120px;z-index:140;background:#000;border-bottom:1px solid rgba(255,255,255,0.04);padding:8px 0 8px 14px}
.subcat-tabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;justify-content:flex-start;flex-wrap:nowrap;padding-right:14px}
.subcat-tabs::-webkit-scrollbar{display:none}
.subcat-tab{flex-shrink:0;padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:rgba(255,255,255,0.03);cursor:pointer;transition:.2s;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.subcat-tab.active,.subcat-tab:active{background:var(--pink-dim);border-color:var(--pink-border)}
.subcat-tab.active .sct-label{color:var(--pink)}
.sct-icon{font-size:15px;line-height:1}
.sct-label{font-size:10px;font-weight:700;color:var(--muted);font-family:'Space Mono',monospace;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}

/* ── SEARCH ── */
.search-bar{padding:8px 20px;border-bottom:1px solid var(--border);background:#000}
.search-inner{max-width:480px;margin:0 auto;position:relative}
.search-inner svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.3;pointer-events:none}
.search-input{width:100%;padding:9px 12px 9px 34px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:11px;color:#fff;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:.2s}
.search-input:focus{border-color:var(--pink)}
.search-input::placeholder{color:var(--muted)}

/* ── MODE HERO ── */
.mode-hero{padding:14px 20px;text-align:center;border-bottom:1px solid var(--border);background:rgba(255,255,255,0.01)}
.mode-hero h2{font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;color:var(--pink);margin-bottom:2px}
.mode-hero p{font-size:12px;color:var(--muted);font-family:'Space Mono',monospace}

/* ── MODEL GRID ── */
.models-wrap{max-width:1280px;margin:0 auto;padding:16px 20px 80px}
.models-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
@media(max-width:1200px){.models-grid{grid-template-columns:repeat(5,1fr)}}
@media(max-width:1000px){.models-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:760px){.models-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:480px){.models-grid{grid-template-columns:repeat(2,1fr)}}

.model-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative;display:flex;flex-direction:column}
.model-card:hover{border-color:var(--pink-border);transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,0.4)}
.model-card.has-imgs{border-color:rgba(74,222,128,0.2);background:rgba(74,222,128,0.02)}
.model-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--pink),transparent);opacity:0;transition:.25s;z-index:1}
.model-card:hover::before{opacity:1}
.card-thumb{width:100%;aspect-ratio:3/4;overflow:hidden;background:#080b10;position:relative;flex-shrink:0}
.card-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.model-card:hover .card-thumb img{transform:scale(1.04)}
.card-thumb-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted)}
.card-count{position:absolute;bottom:7px;right:7px;background:rgba(232,121,160,0.88);color:#000;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;pointer-events:none;transform:none;line-height:1.4}
.card-info{padding:9px 11px 11px}
.card-section{font-family:'Space Mono',monospace;font-size:7px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--pink);opacity:.7;margin-bottom:2px}
.card-name{font-size:12px;font-weight:700;color:var(--text);line-height:1.3}
.card-id{font-family:'Space Mono',monospace;font-size:8px;color:rgba(100,116,139,.4);margin-top:2px}
.card-action{position:absolute;bottom:0;left:0;right:0;background:rgba(232,121,160,0.92);color:#000;font-size:12px;font-weight:800;padding:7px;text-align:center;opacity:0;transition:.2s}
.model-card:hover .card-action{opacity:1}
.empty-state{grid-column:1/-1;padding:60px 20px;text-align:center;color:var(--muted)}

/* ── UPLOAD PANEL (full screen overlay) ── */
#uploadPanel{position:fixed;inset:0;z-index:500;background:#000000;overflow-y:auto;display:none}
#uploadPanel.open{display:block}
.up-nav{position:sticky;top:0;z-index:10;background:#000000;border-bottom:1px solid rgba(232,121,160,0.2);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.up-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.15rem;color:var(--pink);flex:1}
.up-model-badge{font-family:'Space Mono',monospace;font-size:10px;color:#94a3b8;background:rgba(232,121,160,0.06);border:1px solid var(--pink-border);border-radius:20px;padding:3px 10px}
.up-body{max-width:860px;margin:0 auto;padding:18px 18px 60px}

/* ── SECTION TITLE ── */
.sec-title{font-family:'Space Mono',monospace;font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--pink);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.sec-title-line{flex:1;height:1px;background:rgba(232,121,160,0.12)}

/* ── EXISTING GALLERY ── */
.existing-gallery{display:flex;flex-direction:column;gap:12px;margin-bottom:24px}
.existing-empty{border:1px dashed rgba(255,255,255,0.1);border-radius:12px;padding:16px;text-align:center;color:var(--muted);font-size:13px;background:rgba(255,255,255,0.02)}
.existing-block{border:1px solid var(--border);border-radius:14px;background:#080b10;overflow:hidden}
.existing-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:9px 14px;border-bottom:1px solid rgba(255,255,255,0.05)}
.existing-set-name{font-family:'Space Mono',monospace;font-size:10px;color:#94a3b8;text-transform:uppercase;letter-spacing:1px}
.existing-set-meta{font-size:10px;color:var(--muted)}
.existing-section-label{padding:5px 12px;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;gap:6px;border-bottom:1px solid rgba(255,255,255,0.04)}
.existing-section-label.vor{color:#60a5fa;background:rgba(96,165,250,0.05)}
.existing-section-label.nach{color:#e879a0;background:rgba(232,121,160,0.05)}
.existing-row{display:flex;flex-wrap:wrap;gap:4px;padding:6px 8px}
.existing-cell{position:relative;width:calc(25% - 4px);min-width:60px;aspect-ratio:3/4;background:var(--card);border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,0.06)}
.existing-cell img{width:100%;height:100%;object-fit:cover;display:block;cursor:zoom-in}
.existing-cell.empty-cell{display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);font-family:'Space Mono',monospace}
.existing-tag{position:absolute;bottom:4px;left:4px;background:rgba(0,0,0,0.78);color:#fff;font-family:'Space Mono',monospace;font-size:7px;padding:2px 5px;border-radius:4px;pointer-events:none}
.existing-del{position:absolute;top:4px;right:4px;width:22px;height:22px;background:rgba(248,113,113,0.9);color:#000;border:none;border-radius:50%;font-weight:900;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;line-height:1;transition:.15s}
.existing-del:hover{background:#f87171;transform:scale(1.1)}

/* ── UPLOAD FORM ── */
.cid-row{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:end;margin-bottom:16px}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-label{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted)}
.form-input{padding:10px 14px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:12px;color:#fff;font-size:13px;outline:none;transition:.2s;font-family:'DM Sans',sans-serif}
.form-input:focus{border-color:var(--pink);background:rgba(255,255,255,0.07)}
.form-input::placeholder{color:var(--muted)}

/* FLEXIBLE ANGLE GRID */
.angle-section{margin-bottom:18px}
.angle-section-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.angle-badge{padding:5px 14px;border-radius:20px;font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.angle-badge.vor{background:rgba(96,165,250,0.08);border:1px solid rgba(96,165,250,0.2);color:#60a5fa}
.angle-badge.nach{background:rgba(232,121,160,0.08);border:1px solid rgba(232,121,160,0.2);color:#e879a0}
.angle-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
@media(max-width:600px){.angle-grid{grid-template-columns:repeat(2,1fr)}}
.angle-slot{aspect-ratio:3/4;border-radius:10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;overflow:hidden;position:relative;transition:.2s;border:2px dashed rgba(255,255,255,0.08);background:rgba(255,255,255,0.02)}
.angle-slot.vor-slot{border-color:rgba(96,165,250,0.25);background:rgba(96,165,250,0.03)}
.angle-slot.nach-slot{border-color:rgba(232,121,160,0.25);background:rgba(232,121,160,0.04)}
.angle-slot.filled{border-style:solid;border-color:rgba(74,222,128,0.5);background:rgba(74,222,128,0.04)}
.angle-slot img{width:100%;height:100%;object-fit:cover;display:block}
.slot-icon{font-size:16px;pointer-events:none}
.slot-name{font-family:'Space Mono',monospace;font-size:7px;font-weight:700;color:var(--muted);text-transform:uppercase;pointer-events:none;text-align:center;line-height:1.3}
.slot-check{position:absolute;top:4px;right:4px;background:rgba(74,222,128,0.9);border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:9px;color:#000;font-weight:700;pointer-events:none}
.slot-clear{position:absolute;top:4px;left:4px;background:rgba(248,113,113,0.9);border-radius:50%;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#000;font-weight:700;cursor:pointer;border:none;line-height:1}

/* UPLOAD ACTIONS */
.upload-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
.btn-full{flex:1;min-width:140px;padding:13px;border-radius:12px;font-weight:700;font-size:14px;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:.2s;display:flex;align-items:center;justify-content:center;gap:7px}
.btn-full.primary{background:var(--pink);color:#000}
.btn-full.primary:hover{background:var(--pink2)}
.btn-full.primary:disabled{opacity:.5;cursor:not-allowed}
.btn-full.light{background:rgba(255,255,255,0.05);border:1px solid var(--border);color:var(--muted)}
.btn-full.light:hover{border-color:rgba(232,121,160,0.25);color:var(--pink)}

/* PROGRESS */
.progress-wrap{margin-top:14px;display:none}
.progress-bar{height:4px;background:rgba(255,255,255,0.06);border-radius:4px;overflow:hidden}
.progress-fill{height:100%;background:var(--pink);border-radius:4px;transition:width .3s}
.status-msg{font-size:12px;margin-top:8px;min-height:18px;color:var(--muted);font-family:'Space Mono',monospace}
.status-msg.ok{color:var(--ok)}.status-msg.err{color:var(--danger)}

/* QUICK TIPS */
.tip-box{background:rgba(96,165,250,0.05);border:1px solid rgba(96,165,250,0.15);border-radius:12px;padding:12px 16px;font-size:12px;color:#94a3b8;line-height:1.7;margin-bottom:16px}
.tip-box strong{color:#60a5fa}

/* ── LIGHTBOX ── */
#lightbox{position:fixed;inset:0;z-index:5000;background:rgba(0,0,0,0.97);display:none;align-items:center;justify-content:center;cursor:zoom-out}
#lightbox.open{display:flex}
#lightbox img{max-width:94vw;max-height:92svh;object-fit:contain;border-radius:8px}
#lb-close{position:fixed;top:14px;right:14px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.1);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:5001}

/* ── TOAST ── */
#toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 22px;border-radius:22px;font-weight:700;font-size:13px;z-index:9999;display:none;pointer-events:none;white-space:nowrap}

/* ── COOKIE ── */
#ls-consent{position:fixed;bottom:0;left:0;right:0;z-index:99999;background:#0c0f16;border-top:1px solid rgba(232,121,160,0.25);padding:12px 16px;display:none}
#ls-consent.show{display:block}
.lsci{max-width:1100px;margin:0 auto;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.lsct{flex:1;min-width:220px;font-size:12px;color:#94a3b8;line-height:1.5}
.lsct a{color:#60a5fa;text-decoration:none}
.lscbtns{display:flex;gap:8px;flex-shrink:0}
.lsca{padding:8px 18px;background:#e879a0;color:#000;border:none;border-radius:10px;font-weight:700;font-size:13px;cursor:pointer}
.lscd{padding:8px 18px;background:transparent;color:#64748b;border:1px solid rgba(255,255,255,0.08);border-radius:10px;font-weight:700;font-size:13px;cursor:pointer}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#e879a022;border-radius:2px}
@media(max-width:500px){.cid-row{grid-template-columns:1fr}}

/* ── HARD BLACK + CENTER FIX ── */
html,body,#loginScreen,nav,.mode-tabs-wrap,.subcat-wrap,.search-bar,.mode-hero,.models-wrap,#uploadPanel,.up-nav,.login-card,.model-card,.existing-block,#ls-consent{background:#000000!important;background-image:none!important}
.model-card,.card-info,.card-thumb-ph,.empty-state,.mode-hero,.login-logo,.login-title{text-align:center!important}
.card-thumb-ph{flex-direction:column;gap:8px}
.card-info{display:flex;flex-direction:column;align-items:center;justify-content:center}
.card-section,.card-name,.card-id{width:100%;text-align:center}
.existing-empty,.tip-box,.form-input,.search-input,.subcat-tab,.btn-sm.light,.btn-full.light,.angle-slot{background:#000000!important}


/* ── EXTRA HARD BLACK + CENTERED UI FIX ── */
*{text-align:inherit}
html,body,#loginScreen,nav,.mode-tabs-wrap,.subcat-wrap,.search-bar,.mode-hero,.models-wrap,#uploadPanel,.up-nav,.login-card,.model-card,.card-info,.card-thumb,.existing-block,.existing-gallery,.up-body,.form-card,.angle-slot,.tip-box,#ls-consent{background:#000000!important;background-image:none!important}
.mode-tabs,.models-grid,.login-card,.mode-hero,.card-info,.card-thumb-ph,.existing-empty,.sec-title,.up-title,.up-model-badge{text-align:center!important;justify-content:center!important}
.subcat-tabs{justify-content:flex-start!important}
.card-info{align-items:center!important}.card-section,.card-name,.card-id,.card-action{width:100%;text-align:center!important}


.model-code-badge{font-family:'Space Mono',monospace;font-size:8px;font-weight:700;
  color:rgba(232,121,160,0.5);margin-right:4px;vertical-align:middle;flex-shrink:0}

/* ── BASIS BILDER PANEL ── */
#baseBilderPanel{display:none;min-height:100svh}
#baseBilderPanel.open{display:block}
.basis-nav{position:sticky;top:72px;z-index:149;background:#000;border-bottom:1px solid var(--border);padding:8px 14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.basis-mode-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:rgba(255,255,255,0.03);color:var(--muted);font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:.2s;text-transform:uppercase}
.basis-mode-btn.active{background:var(--pink-dim);border-color:var(--pink-border);color:var(--pink)}
.basis-hero{padding:12px 20px;text-align:center;border-bottom:1px solid var(--border)}
.basis-hero h2{font-family:'Rajdhani',sans-serif;font-size:1.3rem;font-weight:700;color:var(--pink)}
.basis-hero p{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace}
.basis-grid-wrap{max-width:1280px;margin:0 auto;padding:16px 20px 80px}
.basis-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
@media(max-width:1200px){.basis-grid{grid-template-columns:repeat(5,1fr)}}
@media(max-width:1000px){.basis-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:760px){.basis-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:480px){.basis-grid{grid-template-columns:repeat(2,1fr)}}
.basis-card{background:#000;border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative;display:flex;flex-direction:column;text-align:center}
.basis-card:hover{border-color:var(--pink-border);transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.4)}
.basis-card.has-img{border-color:rgba(74,222,128,0.3)}
.basis-card.is-featured{border-color:rgba(232,121,160,0.6);box-shadow:0 0 14px rgba(232,121,160,0.12)}
.basis-thumb{width:100%;aspect-ratio:3/4;overflow:hidden;background:#080b10;position:relative;flex-shrink:0}
.basis-thumb img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .3s}
.basis-card:hover .basis-thumb img{transform:scale(1.04)}
.basis-thumb-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--muted)}
.basis-thumb-ph svg{opacity:.3}
.basis-info{padding:8px 10px 10px;display:flex;flex-direction:column;align-items:center}
.basis-name{font-size:11px;font-weight:700;color:var(--text);line-height:1.3}
.basis-id{font-family:'Space Mono',monospace;font-size:8px;color:rgba(100,116,139,.5);margin-top:2px}
.basis-feat-badge{position:absolute;top:6px;left:6px;background:rgba(232,121,160,0.88);color:#000;font-size:8px;font-weight:700;padding:2px 6px;border-radius:8px;font-family:'Space Mono',monospace}
.basis-has-badge{position:absolute;top:6px;right:6px;background:rgba(74,222,128,0.88);color:#000;font-size:8px;font-weight:700;padding:2px 6px;border-radius:8px;font-family:'Space Mono',monospace}
/* BASIS UPLOAD PANEL */
#basisUpPanel{position:fixed;inset:0;z-index:600;background:#000;overflow-y:auto;display:none}
#basisUpPanel.open{display:block}
.bup-nav{position:sticky;top:0;z-index:10;background:#000;border-bottom:1px solid rgba(232,121,160,.2);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.bup-title{font-family:'Rajdhani',sans-serif;font-weight:700;font-size:1.1rem;color:var(--pink);flex:1}
.bup-body{max-width:500px;margin:0 auto;padding:24px 18px 60px}
.bup-thumb-preview{width:100%;aspect-ratio:3/4;max-width:280px;margin:0 auto 20px;border-radius:14px;overflow:hidden;background:#080b10;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;position:relative}
.bup-thumb-preview img{width:100%;height:100%;object-fit:cover}
.bup-drop{border:2px dashed rgba(232,121,160,.25);border-radius:14px;padding:32px 20px;text-align:center;cursor:pointer;transition:.2s;background:rgba(232,121,160,.02)}
.bup-drop:hover{border-color:rgba(232,121,160,.5);background:rgba(232,121,160,.04)}
.bup-drop input{display:none}
.bup-drop-icon{font-size:2rem;margin-bottom:8px}
.bup-drop-txt{font-size:13px;color:var(--muted)}
.bup-feat-row{display:flex;align-items:center;gap:10px;padding:12px 0;border-top:1px solid var(--border);margin-top:16px}
.bup-feat-label{flex:1;font-size:13px;color:var(--text)}
.bup-feat-sub{font-size:11px;color:var(--muted);display:block;margin-top:2px}
.bup-toggle{width:40px;height:22px;border-radius:11px;border:none;cursor:pointer;position:relative;transition:.2s;background:rgba(255,255,255,.1)}
.bup-toggle.on{background:var(--pink)}
.bup-toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:.2s}
.bup-toggle.on::after{left:21px}
</style>

/* ══ STATE ══ */
let currentMode='female', currentSubcat='all';
let galleryCounts={}, galleryThumbs={};
let galleryItems=[];

/* ══ BOOT ══ */
async function bootApp(){
  await loadCounts();
  buildModeTabs();
  buildSubcatTabs();
  renderGrid();
}
document.addEventListener('DOMContentLoaded', bootApp);

/* ══ COUNTS ══ */
async function loadCounts(){
  try{
    const{data}=await sb.from('model_gallery')
      .select('model_id,mode,before_url,after_url,image_url,pair_label,created_at')
      .order('created_at',{ascending:false});
    galleryCounts={};galleryThumbs={};galleryItems=[];
    (data||[]).forEach(r=>{
      const top=topModeFromDb(r.mode,r.model_id);
      const key=`${r.mode||''}:${r.model_id||''}`;
      galleryCounts[key]=(galleryCounts[key]||0)+1;
      if(!galleryThumbs[key])galleryThumbs[key]=r.after_url||r.image_url||'';
      galleryItems.push({
        dbMode:String(r.mode||''),topMode:top,modelId:String(r.model_id||''),
        label:String(r.pair_label||''),thumb:r.after_url||r.image_url||'',before:r.before_url||''
      });
    });
  }catch(e){console.warn('loadCounts:',e.message)}
}

/* ══ TABS ══ */
function buildModeTabs(){
  document.getElementById('modeTabs').innerHTML=MODE_TABS.map(t=>{
    // compute count across all subcats for this mode
    const cnt=galleryCardCount(t.mode);
    return`<button class="mode-tab${t.mode===currentMode?' active':''}" onclick="setMode('${t.mode}',this)">
      <span>${t.label}</span>
      <span class="mode-tab-count" id="cnt-${t.mode}">${cnt||'–'}</span>
    </button>`;
  }).join('');
}

function topModeFromDb(dbMode,modelId=''){
  const cat=CATALOG_BY_ID[String(modelId||'')];
  if(cat&&cat.top)return cat.top;
  dbMode=String(dbMode||'');
  if(dbMode==='male')return 'male';
  if(dbMode==='female')return 'female';
  if(dbMode==='beard')return 'beard';
  if(dbMode==='treatment'||dbMode==='behandlung'||dbMode==='color_behandlung')return 'behandlung';
  if(dbMode==='color'||dbMode.startsWith('color_'))return 'color';
  if(dbMode.startsWith('face_'))return 'face';
  return '';
}
function dbModeForModel(m,mode=currentMode){return m.mode||mode}
function modelCats(m){return Array.isArray(m.cats)&&m.cats.length?m.cats:[m.cat]}
function modelMatchesSubcat(m){
  if(currentSubcat==='all')return true;
  if(currentMode==='behandlung'){
    const cat=String(m.cat||'').toLowerCase();
    if(currentSubcat==='keratin')return cat.includes('keratin');
    if(currentSubcat==='perm_women')return cat.includes('damen');
    if(currentSubcat==='perm_men')return cat.includes('herren');
  }
  return modelCats(m).some(c=>String(c||'')===currentSubcat||String(c||'').includes(currentSubcat));
}

function normKey(v){return String(v||'').toLowerCase().normalize('NFKD').replace(/[\u0300-\u036f]/g,'').replace(/&/g,'and').replace(/[^a-z0-9]+/g,'').trim()}
function nameMapGroupForMode(mode){return mode}
function canonicalNameForModel(mode,m){
  const group=nameMapGroupForMode(mode);
  return (STYLE_NAME_MAP[group]&&STYLE_NAME_MAP[group][m.id])||m.name||m.id;
}
const CATALOG_BY_ID={};
Object.keys(MODEL_DATA).forEach(top=>{(MODEL_DATA[top]||[]).forEach(item=>{if(!CATALOG_BY_ID[item.id])CATALOG_BY_ID[item.id]=item})});

function syncModelNames(){
  Object.keys(MODEL_DATA).forEach(mode=>{
    (MODEL_DATA[mode]||[]).forEach(m=>{m.name=canonicalNameForModel(mode,m)})
  });
}
syncModelNames();
function aliasesForModel(mode,m){
  const base=[m.id,m.name,canonicalNameForModel(mode,m),String(m.id).replace(/^0+/,''),`style-${m.id}`,`model-${m.id}`];
  // Color/Behandlung: also add name-based prefix to match old long-format IDs
  // Old format: "color_natural_soft_black_..." → normKey → "colornaturalsoftblack..."
  if(mode==='color'||mode==='behandlung'){
    const nname=normKey(m.name);
    if(nname.length>4){
      base.push('color'+nname);       // matches old "color_NAME_..." IDs
      base.push('tech'+nname);        // matches old "tech_NAME_..." treatment IDs
      base.push(nname);               // matches IDs that are just the name
    }
  }
  return new Set(base.map(normKey).filter(Boolean));
}
function galleryRowsForModel(mode,m){
  const aliases=aliasesForModel(mode,m);
  const dbMode=dbModeForModel(m,mode);
  return galleryItems.filter(g=>{
    if(g.topMode!==mode)return false;
    // For color/behandlung, mode check is flexible (old records may have 'color' not 'color_vollfarbe')
    if(mode==='color'||mode==='behandlung'){
      if(g.dbMode&&g.dbMode!=='color'&&g.dbMode!=='behandlung'&&g.dbMode!==dbMode&&!g.dbMode.startsWith('color_'))return false;
    }
    const gNorm=normKey(g.modelId);
    const lNorm=normKey(g.label);
    // Exact match
    if(aliases.has(gNorm)||aliases.has(lNorm))return true;
    // Prefix/substring match for old long-format IDs (e.g. "colornaturalsoftblack...")
    if(mode==='color'||mode==='behandlung'){
      for(const alias of aliases){
        if(alias.length>7&&(gNorm.startsWith(alias)||gNorm.includes(alias)))return true;
      }
    }
    return false;
  });
}
function currentUploadAliases(){
  const nname=normKey(currentModelName);
  return new Set([
    currentModelId,
    currentModelName,
    String(currentModelId||'').replace(/^0+/,''),
    `style-${currentModelId}`,
    `model-${currentModelId}`,
    // For color: also match old long-format IDs by name prefix
    'color'+nname,
    'tech'+nname,
    nname
  ].map(normKey).filter(Boolean));
}
function rowMatchesCurrentUpload(r){
  const wantedTop=topModeFromDb(currentModelMode,currentModelId)||currentMode;
  const rowTop=topModeFromDb(r.mode,r.model_id);
  if(wantedTop&&rowTop&&rowTop!==wantedTop)return false;
  // Color/behandlung: mode check — allow 'color', 'color_*' variants
  if(wantedTop==='color'||wantedTop==='behandlung'){
    const rMode=String(r.mode||'');
    // Accept: exact match, or 'color'/'color_*' / 'treatment'/'behandlung'
    const modeOk= rMode===currentModelMode
      || rMode==='color' || rMode.startsWith('color_')
      || rMode==='treatment' || rMode==='behandlung';
    if(!modeOk)return false;
  }
  const aliases=currentUploadAliases();
  const gNorm=normKey(r.model_id);
  const lNorm=normKey(r.pair_label);
  // Exact match
  if(aliases.has(gNorm)||aliases.has(lNorm))return true;
  // Substring match for old long-format IDs
  if(wantedTop==='color'||wantedTop==='behandlung'){
    for(const alias of aliases){
      if(alias.length>6&&(gNorm.startsWith(alias)||gNorm.includes(alias)))return true;
    }
  }
  return false;
}
function galleryCountForModel(mode,m){return galleryRowsForModel(mode,m).length}
function galleryThumbForModel(mode,m){const r=galleryRowsForModel(mode,m).find(x=>x.thumb);return r?r.thumb:''}
function galleryCardCount(mode){
  return (MODEL_DATA[mode]||[]).filter(m=>galleryCountForModel(mode,m)>0).length;
}
function galleryRowCountForModel(mode,m){return galleryCountForModel(mode,m)}

function buildSubcatTabs(){
  const tabs=SUBCATS[currentMode]||[];
  document.getElementById('subcatTabs').innerHTML=tabs.map(t=>`
    <button class="subcat-tab${t.cat===currentSubcat?' active':''}" onclick="setSubcat('${t.cat}',this)"><span class="sct-label">${t.label}</span></button>`).join('');
}

function setMode(mode,btn){
  currentMode=mode;currentSubcat='all';
  document.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('active'));
  if(btn)btn.classList.add('active');
  else{const el=document.getElementById(`tab-${mode}`);if(el)el.classList.add('active')}
  document.getElementById('searchInput').value='';
  buildSubcatTabs();renderGrid();
}

function setSubcat(cat,btn){
  currentSubcat=cat;
  document.querySelectorAll('.subcat-tab').forEach(t=>t.classList.remove('active'));
  if(btn)btn.classList.add('active');
  renderGrid();
}


/* ══ RENDER GRID ══ */
function renderGrid(){
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase();
  const list=(MODEL_DATA[currentMode]||[]).filter(m=>{
    const matchSub=modelMatchesSubcat(m);
    const matchQ=!q||m.name.toLowerCase().includes(q)||m.id.toLowerCase().includes(q);
    const hasImg=galleryCountForModel(currentMode,m)>0;
    return matchSub&&matchQ&&hasImg;
  });
  const modeLabel={female:'Damen',male:'Herren',beard:'Bart',color:'Farbe',behandlung:'Behandlung'};
  const grid=document.getElementById('modelsGrid');
  const knownCards=list.map(m=>{
    const cnt=galleryRowCountForModel(currentMode,m);
    const thumb=galleryThumbForModel(currentMode,m);
    const displayName=canonicalNameForModel(currentMode,m);
    const sectionText=modelCats(m).join(' · ');
    return`<div class="model-card has-imgs" onclick="openGallery('${esc(m.id)}','${js(displayName)}','${esc(currentMode)}')">
      <div class="card-thumb">
        <img src="${esc(thumb)}" loading="lazy" alt="${esc(displayName)}">
        <div class="card-count">${cnt}</div>
      </div>
      <div class="card-info">
        <div class="card-section">${modeLabel[currentMode]||currentMode} · ${sectionText}</div>
        <div class="card-name">${displayName}</div>
        <div class="card-id">#${m.id}</div>
      </div>
      <div class="card-action">📸 Beispiele ansehen</div>
    </div>`;
  }).join('');
  const withImgs=list.filter(m=>galleryCountForModel(currentMode,m)>0).length;
  grid.innerHTML=knownCards||`<div class="empty-state"><div style="font-size:2rem;margin-bottom:10px;opacity:.3">📸</div><p>Noch keine Bilder in dieser Kategorie</p></div>`;
  document.getElementById('modeTitle').textContent=`Logic Style · ${modeLabel[currentMode]||currentMode} Galerie`;
  document.getElementById('modeMeta').textContent=`${list.length} Style${list.length!==1?'s':''} mit Beispielfotos`;
}


/* ══ PUBLIC GALLERY VIEWER ══ */
function openGallery(id, name, mode){
  const m=MODEL_DATA[mode]?.find(x=>x.id===id)||{id,name,mode,cat:''};
  const rows=galleryRowsForModel(mode,m);
  if(!rows.length)return;
  document.getElementById('gmTitle').textContent=name+' · #'+id;
  const grid=document.getElementById('gmGrid');
  grid.innerHTML=rows.map(r=>{
    const after=r.thumb||'';
    const before=r.before||'';
    if(!after)return'';
    if(before){
      return`<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:10px">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
          <div>
            <div style="font-size:8px;color:var(--muted);font-family:'Space Mono',monospace;letter-spacing:1px;text-align:center;margin-bottom:4px">VORHER</div>
            <img src="${esc(before)}" style="width:100%;border-radius:8px;object-fit:cover;cursor:zoom-in" loading="lazy" onclick="openLb('${js(before)}')" alt="Vorher">
          </div>
          <div>
            <div style="font-size:8px;color:var(--muted);font-family:'Space Mono',monospace;letter-spacing:1px;text-align:center;margin-bottom:4px">NACHHER</div>
            <img src="${esc(after)}" style="width:100%;border-radius:8px;object-fit:cover;cursor:zoom-in" loading="lazy" onclick="openLb('${js(after)}')" alt="Nachher">
          </div>
        </div>
      </div>`;
    }
    return`<div style="aspect-ratio:3/4;border-radius:12px;overflow:hidden;border:1px solid rgba(255,255,255,0.08);cursor:zoom-in" onclick="openLb('${js(after)}')">
      <img src="${esc(after)}" style="width:100%;height:100%;object-fit:cover;display:block" loading="lazy" alt="${esc(name)}">
    </div>`;
  }).join('');
  document.getElementById('galleryModal').style.display='block';
  document.body.style.overflow='hidden';
}
function closeGalleryModal(){
  document.getElementById('galleryModal').style.display='none';
  document.body.style.overflow='';
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function js(s){return String(s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'")}

/* ══ LIGHTBOX ══ */
function openLb(url){if(!url)return;document.getElementById('lbImg').src=url;document.getElementById('lightbox').classList.add('open')}
function closeLb(){document.getElementById('lightbox').classList.remove('open');document.getElementById('lbImg').src=''}
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeLb();closeGalleryModal()}});

/* ══ TOAST ══ */
function toast(msg,ok=true){
  const el=document.getElementById('toast');
  el.textContent=msg;el.style.display='block';
  el.style.background=ok?'rgba(74,222,128,0.12)':'rgba(248,113,113,0.12)';
  el.style.border=ok?'1px solid rgba(74,222,128,0.3)':'1px solid rgba(248,113,113,0.3)';
  el.style.color=ok?'#4ade80':'#f87171';
  clearTimeout(window._tt);window._tt=setTimeout(()=>el.style.display='none',3200);
}
